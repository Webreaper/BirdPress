name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build win-x64
      run: dotnet publish BirdPress.sln -c Release --runtime win-x64 --self-contained -o BirdPress-win-x64 /p:PublishSingleFile=true /p:PublishTrimmed=false /p:AssemblyVersion=1.0.${{ github.run_number }}
      
    - name: Build linux-x64
      run: dotnet publish BirdPress.sln -c Release --runtime linux-x64 --self-contained -o BirdPress-linux-x64 /p:PublishSingleFile=true /p:PublishTrimmed=false /p:AssemblyVersion=1.0.${{ github.run_number }}
      
    - name: Build osx-x64
      run: dotnet publish BirdPress.sln -c Release --runtime osx-x64 --self-contained -o BirdPress-osx-x64 /p:PublishSingleFile=true /p:PublishTrimmed=false /p:AssemblyVersion=1.0.${{ github.run_number }}

    - name: Pack executables
      shell: bash
      run: |
        7z a -tzip "./artifacts/BirdPress-win-x64.zip" "./BirdPress-win-x64/*"
        tar czvf "./artifacts/BirdPress-linux-x64.tar.gz" "BirdPress-linux-x64"
        tar czvf "./artifacts/BirdPress-osx-x64.tar.gz" "BirdPress-osx-x64"
        rm -r "BirdPress-win-x64"
        rm -r "BirdPress-linux-x64"
        rm -r "BirdPress-osx-x64"
    
    - name: Create the Release
      id: create_release
      if: ${{ github.event_name == 'push' }}
      uses: actions/create-release@v1.1.3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: 1.0.${{ github.run_number }}
        release_name: Release 1.0.${{ github.run_number }}
        draft: false
        
    - name: Upload BirdPress-win-x64.zip
      if: ${{ github.event_name == 'push' }}
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/BirdPress-win-x64.zip
        asset_name: BirdPress-win-x64.zip
        asset_content_type: application/zip

    - name: Upload BirdPress-linux-x64.zip
      if: ${{ github.event_name == 'push' }}
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/BirdPress-linux-x64.tar.gz
        asset_name: BirdPress-linux-x64.tar.gz
        asset_content_type: application/gzip

    - name: Upload BirdPress-osx-x64.zip
      if: ${{ github.event_name == 'push' }}
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/BirdPress-osx-x64.tar.gz
        asset_name: BirdPress-osx-x64.tar.gz
        asset_content_type: application/gzip
