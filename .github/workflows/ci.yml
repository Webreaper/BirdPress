name: BirdPressBuild
on: 
  push:
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git Ref (Optional)    
        required: false

jobs:
  build-birdpress:
    runs-on: ${{ matrix.os }}
    strategy: 
      matrix: 
        target: [mac, linux, windows, raspi]
        include: 
          - target: linux
            os: ubuntu-latest
            runtime: linux-x64
          - target: mac
            os: macos-latest
            runtime: osx-x64
          - target: raspi
            os: ubuntu-latest
            runtime: linux-arm64
          - target: windows
            os: ubuntu-latest
            runtime: win-x64
     
    steps:
    - name: Clone Repository (release)
      uses: actions/checkout@v3

    - name: Clone Repository (Custom Ref)
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.inputs.git-ref }}
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4.2.0
      with:
        dotnet-version: 10.0.100

    - name: Build BirdPress-${{matrix.target}}
      run: dotnet publish BirdPress.sln -c Release --runtime ${{matrix.runtime}} --self-contained true -p:PublishTrimmed=false /p:PublishSingleFile=true --property:PublishDir=${{github.workspace}}/publish /p:Version=1.0.${{github.run_number}}
    
    - name: Add Version File
      run: echo 1.0.${{github.run_number}} > ${{github.workspace}}/publish/version.txt
      
    - name: Zip the release
      run: |
           pushd ${{github.workspace}}/publish
           zip -r ${{github.workspace}}/publish/BirdPress-${{matrix.target}}.zip . 
           popd

    - name: Upload Dev artifacts
      if: github.ref == 'refs/heads/develop'
      uses: actions/upload-artifact@v4
      with:
        name: BirdPress-${{ matrix.target }}-1.0.${{ github.run_number }}-dev.zip
        path: ${{github.workspace}}/publish/BirdPress-${{matrix.target}}.zip
        retention-days: 5    

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: ${{github.workspace}}/publish/BirdPress-${{matrix.target}}.zip
        name: Release 1.0.${{ github.run_number }}
        tag_name: 1.0.${{ github.run_number }}
        make_latest: true        

